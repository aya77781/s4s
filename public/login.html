<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>$forS – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="concept-link">
    <a href="index.html">← Back to Home</a>
  </div>
  <div class="login-container">
    <div class="login-card">
      <img src="Logo.jpg" alt="$forS" class="login-logo" />
      <h2>Student Login</h2>
      <form id="login-form">
        <label>Email</label>
        <input type="email" id="email" required placeholder="admin@s4s.test" />
        <label>Password</label>
        <input type="password" id="password" required placeholder="123456" />
        <button type="submit" class="btn">Login</button>
        <p id="login-error" class="error"></p>
        <p class="switch-link">Don't have an account? <a href="register.html">Create one</a></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("login-error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      if (!res.ok) {
        errorMsg.textContent = "Incorrect email or password.";
        return;
      }

      const user = await res.json();
      localStorage.setItem("fors_user", JSON.stringify(user));
      
      // Rediriger selon le rôle
      if (user.role === "Admin") {
        window.location.href = "admin.html";
      } else if (user.role === "Alumni") {
        window.location.href = "alumni.html";
      } else if (user.role === "Donor") {
        window.location.href = "donor.html";
      } else if (user.role === "Partner") {
        window.location.href = "partner.html";
      } else if (user.role === "Student") {
        window.location.href = "student.html";
      } else {
        window.location.href = "student.html";
      }
    });
  </script>
</body>
</html>
